providers:
  llm:
    type: openai
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
  image:
    type: openai
    model: dall-e-3
    api_key_env: OPENAI_API_KEY
    default_size: [1920, 1080]
  audio:
    type: openai
    model: tts-1-hd
    voice: alloy
    api_key_env: OPENAI_API_KEY

pipeline:
  max_concurrency: 3
  retry_attempts: 3
  request_timeout: 60

output:
  dir: ./output
  resolution: [1920, 1080]
  fps: 30
